name: Capture project screenshots

on:
  push:
    branches:
      - generate-project-screenshots
    paths:
      - .github/workflows/capture-project-screenshots.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: generate-project-screenshots

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          mkdir -p generated-screenshots
          cat > capture.mjs <<'EOF'
          import { chromium } from 'playwright';

          const sites = [
            ['ridwaan-portfolio', 'https://ridwaan-portfolio.vercel.app/'],
            ['learn-python', 'https://learn-python-ridwaan.vercel.app/'],
            ['dalxiis', 'https://dalxiis-six.vercel.app/']
          ];

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({
            viewport: { width: 1600, height: 900 },
            deviceScaleFactor: 1
          });

          for (const [name, url] of sites) {
            await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            await page.waitForTimeout(3000);
            await page.screenshot({
              path: `generated-screenshots/${name}.png`,
              fullPage: false
            });
          }

          await browser.close();
          EOF
          node capture.mjs

      - name: Commit generated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated-screenshots/*.png
          git commit -m "Generate current project screenshots"
          git push origin generate-project-screenshots
