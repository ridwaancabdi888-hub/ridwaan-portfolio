name: Capture daily project screenshots

on:
  pull_request:
    branches:
      - master
    paths:
      - .portfolio-sync-trigger

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture current live screenshots
        run: |
          mkdir -p public/project-images
          cat > capture-daily-projects.mjs <<'EOF'
          import { chromium } from 'playwright';

          const projects = [
            {
              name: 'kireeye',
              url: 'https://kireeye-x2oq-ruddy.vercel.app/',
              wait: 7000,
            },
            {
              name: 'ridwaan-mobile-store',
              url: 'https://ridwaan-mobile-store.vercel.app/',
              wait: 5000,
            },
          ];

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({
            viewport: { width: 1600, height: 900 },
            deviceScaleFactor: 1,
          });

          for (const project of projects) {
            await page.goto(project.url, {
              waitUntil: 'domcontentloaded',
              timeout: 90000,
            });
            await page.waitForTimeout(project.wait);
            await page.screenshot({
              path: `public/project-images/${project.name}.png`,
              fullPage: false,
            });
          }

          await browser.close();
          EOF
          node capture-daily-projects.mjs

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .portfolio-sync-trigger
          git add public/project-images/kireeye.png public/project-images/ridwaan-mobile-store.png
          git commit -m "Add current screenshots for Kireeye and Mobile Store"
          git push origin HEAD:${{ github.head_ref }}
